name: Set up rsh build & test environment
description: >
  Installs the system dependencies, builds (or restores from cache) the custom
  GNU-R from the external/R submodule, and sets up the JDK + Maven. The server
  test suite needs this patched GNU-R (NOT a vanilla CRAN R): tests resolve it
  via the default R_BIN (../external/R/bin/R) and the bc2c tests compile against
  external/R/include. See tools/build-gnur.sh.

runs:
  using: composite
  steps:
    - name: Install system dependencies
      shell: bash
      env:
        DEBIAN_FRONTEND: noninteractive
      # Dependencies needed to build GNU-R and to run the gcc-based bc2c tests.
      run: |
        sudo apt-get update -y
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          ca-certificates \
          gfortran \
          libbz2-dev \
          libcairo2-dev \
          libcurl4-openssl-dev \
          libicu-dev \
          libjpeg-dev \
          liblzma-dev \
          libpango1.0-dev \
          libpcre2-dev \
          libpng-dev \
          libreadline-dev \
          libssl-dev \
          libtiff5-dev \
          libx11-dev \
          libxt-dev \
          rsync \
          zlib1g-dev

    - name: Record GNU-R submodule commit
      id: gnur
      shell: bash
      run: echo "sha=$(git rev-parse HEAD:external/R)" >> "$GITHUB_OUTPUT"

    - name: Cache custom GNU-R
      id: cache-gnur
      uses: actions/cache@v4
      with:
        path: external/R
        key: gnur-${{ runner.os }}-${{ steps.gnur.outputs.sha }}-${{ hashFiles('tools/build-gnur.sh') }}

    - name: Build custom GNU-R
      if: steps.cache-gnur.outputs.cache-hit != 'true'
      shell: bash
      run: |
        git submodule update --init --depth 1 external/R
        ./tools/build-gnur.sh external/R

    - name: Set up JDK 24 + Maven
      uses: actions/setup-java@v4
      with:
        java-version: "24"
        distribution: "temurin"
        cache: maven
