# This workflow builds and tests the R compile server with Maven.
# It builds the custom (patched) GNU-R from the external/R submodule, which the
# test suite requires, then runs the Maven build/tests against it.

name: Java CI with Maven

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  artifact:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up build environment (JDK + custom GNU-R)
        uses: ./.github/actions/setup-rsh-env
      - name: Build artifact
        working-directory: server
        run: mvn --batch-mode --update-snapshots package
      - run: mkdir staging && cp target/*.jar staging
        working-directory: server
      - name: Upload snapshot as artifact
        uses: actions/upload-artifact@v4
        with:
          name: snapshot
          path: server/target/*-SNAPSHOT.jar
      # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
        with:
          directory: server

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up build environment (JDK + custom GNU-R)
        uses: ./.github/actions/setup-rsh-env
      - name: Run tests (no static analyses)
        working-directory: server
        run: mvn --batch-mode --update-snapshots test

  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up build environment (JDK + custom GNU-R)
        uses: ./.github/actions/setup-rsh-env
      - name: Run tests and static analyses
        working-directory: server
        run: mvn --batch-mode --update-snapshots verify
